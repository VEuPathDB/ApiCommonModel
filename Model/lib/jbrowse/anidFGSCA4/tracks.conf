urlTemplate=/a/service/jbrowse/store?data=AnidulansFGSCA4/alignedTranscripts/gff/anidFGSCA4_TurnerAnnotation_transcript_sequences_RSRC/anidFGSCA4_TurnerAnnotation_transcript_sequences_RSRC.gff.gz
